{% extends "base.html" %}

{% block title %}Portfolio Not Found{% endblock %}

{% block content %}
  <main class="mx-auto flex min-h-screen max-w-3xl items-center justify-center px-6 py-12">
    <section class="w-full rounded-3xl border border-white/70 bg-white/90 p-10 text-center shadow-card backdrop-blur">
      <p class="text-sm font-semibold uppercase tracking-[0.24em] text-accent">404</p>
      <h1 class="mt-4 text-4xl font-black tracking-tight text-slate-900">Portfolio not found</h1>
      <p class="mt-4 text-base leading-8 text-slate-600">
        We could not find a published portfolio for
        <span class="font-semibold text-slate-800">{{ requested_host or "this request" }}</span>.
      </p>
      <p class="mt-2 text-sm text-slate-500">
        Check the subdomain, publication state, and host configuration.
      </p>
    </section>
  </main>
{% endblock %}
