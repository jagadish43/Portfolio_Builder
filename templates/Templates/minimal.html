<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ portfolio.full_name }} | Portfolio</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;700&family=DM+Sans:wght@400;500;700&family=Manrope:wght@400;500;700&display=swap");
      body { margin: 0; font-family: "{{ theme_config.font_family }}", sans-serif; background: {{ theme_config.mode == "dark" and "#0b1020" or theme_config.background_color }}; color: {{ theme_config.mode == "dark" and "#e2e8f0" or theme_config.text_color }}; }
      .shell { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: 56px 0 80px; }
      .header { border-bottom: 2px solid {{ theme_config.primary_color }}33; padding-bottom: 28px; }
      .header h1 { font-size: clamp(2.8rem, 7vw, 4.5rem); margin: 12px 0; }
      .nav { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
      .nav a { color: {{ theme_config.primary_color }}; font-weight: 700; }
      .stack { display: grid; gap: 18px; margin-top: 32px; }
      .section-card { padding: 28px 0; border-bottom: 1px solid {{ theme_config.text_color }}22; }
    </style>
  </head>
  <body data-subdomain="{{ portfolio.subdomain }}">
    <main class="shell">
      <header class="header">
        <div style="letter-spacing:.2em;text-transform:uppercase;font-size:12px;color:{{ theme_config.primary_color }};font-weight:700;">Minimal</div>
        <h1>{{ portfolio.full_name }}</h1>
        <p style="font-size:1.1rem;max-width:42rem;line-height:1.8;">{{ portfolio.title_tagline }}</p>
        <nav class="nav">
          {% for section in ordered_sections %}
            <a href="#{{ section.key }}">{{ section.title }}</a>
          {% endfor %}
        </nav>
      </header>
      <div class="stack">
        {% set section_class = "section-card" %}
        {% set heading_class = "text-2xl font-bold" %}
        {% include "Templates/partials/sections.html" %}
      </div>
    </main>
    <script>
      const payload = (eventType, projectSlug = null) => ({
        subdomain: document.body.dataset.subdomain,
        event_type: eventType,
        project_slug: projectSlug,
        source: document.referrer || "direct",
        metadata: { template: "minimal" },
      });
      fetch("/api/analytics/track", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload("visit")) });
      document.querySelectorAll("[data-analytics-event]").forEach((node) => {
        node.addEventListener("click", () => {
          fetch("/api/analytics/track", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload(node.dataset.analyticsEvent, node.dataset.projectSlug || null)) });
        });
      });
    </script>
  </body>
</html>
