<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ portfolio.full_name }} | Creative Portfolio</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap");
      body { margin: 0; font-family: "DM Sans", sans-serif; background: linear-gradient(180deg, {{ theme_config.background_color }} 0%, #fff3e8 100%); color: {{ theme_config.text_color }}; }
      .shell { width: min(1160px, calc(100% - 28px)); margin: 0 auto; padding: 24px 0 72px; }
      .hero { display: grid; gap: 22px; grid-template-columns: 1fr 1fr; align-items: stretch; }
      .panel { border-radius: 34px; padding: 34px; background: rgba(255,255,255,.78); border: 1px solid rgba(255,255,255,.7); box-shadow: 0 22px 60px rgba(249,115,22,.14); backdrop-filter: blur(14px); }
      .nav { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
      .nav a { padding: 10px 14px; border-radius: 999px; background: {{ theme_config.accent_color }}22; font-weight: 700; }
      .grid { display: grid; gap: 20px; margin-top: 22px; }
      .section-card { border-radius: 30px; padding: 30px; background: rgba(255,255,255,.78); border: 1px solid rgba(255,255,255,.7); }
      .headline { font-family: "Space Grotesk", sans-serif; font-size: clamp(3rem, 8vw, 5.6rem); line-height: .9; margin: 10px 0; }
      @media (max-width: 860px) { .hero { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body data-subdomain="{{ portfolio.subdomain }}">
    <main class="shell">
      <section class="hero">
        <article class="panel">
          <div style="letter-spacing:.22em;text-transform:uppercase;font-size:12px;color:{{ theme_config.primary_color }};font-weight:700;">Creative</div>
          <h1 class="headline">{{ portfolio.full_name }}</h1>
          <p style="max-width:28rem;line-height:1.8;font-size:1.08rem;">{{ portfolio.title_tagline }}</p>
          <nav class="nav">
            {% for section in ordered_sections %}
              <a href="#{{ section.key }}">{{ section.title }}</a>
            {% endfor %}
          </nav>
        </article>
        <article class="panel" style="background: linear-gradient(135deg, {{ theme_config.primary_color }}, {{ theme_config.accent_color }}); color: white;">
          <p style="font-size:1.1rem;line-height:2;">{{ portfolio.bio }}</p>
        </article>
      </section>
      <div class="grid">
        {% set section_class = "section-card" %}
        {% set heading_class = "text-2xl font-bold" %}
        {% include "Templates/partials/sections.html" %}
      </div>
    </main>
    <script>
      const payload = (eventType, projectSlug = null) => ({
        subdomain: document.body.dataset.subdomain,
        event_type: eventType,
        project_slug: projectSlug,
        source: document.referrer || "direct",
        metadata: { template: "creative" },
      });
      fetch("/api/analytics/track", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload("visit")) });
      document.querySelectorAll("[data-analytics-event]").forEach((node) => {
        node.addEventListener("click", () => {
          fetch("/api/analytics/track", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload(node.dataset.analyticsEvent, node.dataset.projectSlug || null)) });
        });
      });
    </script>
  </body>
</html>
