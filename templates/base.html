<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="csrf-token" content="{{ csrf_token | default('', true) }}" />
    <title>{% block title %}Portfolio Builder{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#0f766e",
              accentSoft: "#ccfbf1",
              panel: "#f8fafc",
            },
            boxShadow: {
              card: "0 24px 64px rgba(15, 23, 42, 0.08)",
            },
          },
        },
      };
      window.csrfToken = document.querySelector('meta[name="csrf-token"]')?.content || "";
    </script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900 antialiased">
    <div class="fixed inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(15,118,110,0.16),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(249,115,22,0.16),_transparent_24%),linear-gradient(180deg,#f8fafc_0%,#eef2ff_100%)]"></div>
    <div
      id="toast-region"
      class="pointer-events-none fixed right-4 top-4 z-50 flex w-full max-w-sm flex-col gap-3"
      aria-live="polite"
      aria-atomic="true"
    ></div>
    {% block content %}{% endblock %}
    <script>
      (() => {
        const toastRegion = document.getElementById("toast-region");
        const initialToasts = {{ toast_messages | default([], true) | tojson }};
        const palette = {
          success: ["border-emerald-200", "bg-emerald-50", "text-emerald-900", "text-emerald-600", "Success", "✓"],
          warning: ["border-amber-200", "bg-amber-50", "text-amber-900", "text-amber-600", "Warning", "!"],
          error: ["border-rose-200", "bg-rose-50", "text-rose-900", "text-rose-600", "Error", "×"],
        };
        if (!toastRegion) return;
        function removeToast(toast) {
          toast.classList.add("translate-x-4", "opacity-0");
          window.setTimeout(() => toast.remove(), 180);
        }
        function createToast(level, message) {
          const style = palette[level] || palette.warning;
          const toast = document.createElement("div");
          toast.className = `pointer-events-auto rounded-2xl border px-4 py-3 shadow-lg backdrop-blur transition duration-200 ${style[0]} ${style[1]} ${style[2]}`;
          toast.innerHTML = `
            <div class="flex items-start gap-3">
              <div class="mt-0.5 flex h-6 w-6 shrink-0 items-center justify-center rounded-full bg-white/80 text-sm font-bold ${style[3]}">${style[5]}</div>
              <div class="min-w-0 flex-1">
                <p class="text-sm font-semibold">${style[4]}</p>
                <p class="mt-1 text-sm leading-6">${message}</p>
              </div>
              <button type="button" class="rounded-full p-1 text-slate-400 transition hover:bg-white/70 hover:text-slate-700">×</button>
            </div>
          `;
          toast.querySelector("button")?.addEventListener("click", () => removeToast(toast));
          toastRegion.appendChild(toast);
          window.setTimeout(() => removeToast(toast), 4000);
        }
        window.showToast = createToast;
        initialToasts.forEach((toast) => toast?.message && createToast(toast.level, toast.message));
      })();
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
