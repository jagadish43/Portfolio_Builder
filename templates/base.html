<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Portfolio Builder{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#111827",
              cloud: "#f8fafc",
              accent: "#0f766e",
              accentSoft: "#ccfbf1",
            },
            boxShadow: {
              card: "0 24px 60px rgba(15, 23, 42, 0.08)",
            },
          },
        },
      };
    </script>
  </head>
  <body class="min-h-screen bg-slate-100 text-ink antialiased">
    <div class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top_left,_rgba(15,118,110,0.18),_transparent_30%),radial-gradient(circle_at_bottom_right,_rgba(14,165,233,0.16),_transparent_25%)]"></div>
    {% block content %}{% endblock %}
  </body>
</html>
